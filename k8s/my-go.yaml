apiVersion: v1
kind: Pod
metadata:
  name: my-go
  labels:
    app: my-go
    lab: lab2
spec:
  imagePullSecrets:
    - name: ghcr-secret
  containers:
    - name: my-go
      image: ghcr.io/alzoabiaf/containers-lab-1/app:latest
      ports:
      - containerPort: 8081
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"