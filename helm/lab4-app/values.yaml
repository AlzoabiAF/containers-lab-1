#Global settings
global:
  namespace: lab4-app

# PostgreSQL settings
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 15-alpine
  replicaCount: 1
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "local-path" # или rook-ceph-block
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
  env:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: secret
    POSTGRES_DB: myapp
  initSql: |
    CREATE TABLE IF NOT EXISTS users (
    id SERIAL PRIMARY KEY,
    name TEXT NOT NULL,
    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    INSERT INTO users (name) VALUES
    ('Helm User'),
    ('Chart Master'),
    ('DevOps Pro')
    ON CONFLICT DO NOTHING;

# Go application settings
goapp:
  enabled: true
  image:
    repository: ghcr.io/alzoabiaf/containers-lab-1/app
    tag: latest
    pullSecrets:
      - name: ghcr-secret
  replicaCount: 3
  service:
    port: 8081
    type: ClusterIP
  resources:
    requests:
      memory: 64Mi
      cpu: 250m
    limits:
      memory: 128Mi
      cpu: 500m
  probes:
    enabled: true

# Nginx settings
nginx:
  enabled: true
  image:
    repository: nginx
    tag: alpine
  replicaCount: 2
  service:
    port: 80
    type: ClusterIP
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 128Mi
      cpu: 200m

# Ingress settings
ingress:
  enabled: true
  className: nginx
  host: lab4.k8s.local
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"